# .goreleaser.yaml
version: 2

before:
  hooks:
    - go mod tidy

builds:
  - env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    main: ./cmd/ripjira
    binary: ripjira

archives:
  - formats: [tar.gz]
    # use zip for windows archives
    format_overrides:
      - goos: windows
        formats: [zip]
    name_template: >-
      {{ .ProjectName }}_
      {{- .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else if eq .Arch "386" }}i386
      {{- else }}{{ .Arch }}{{ end }}
      {{- if .Arm }}v{{ .Arm }}{{ end }}

checksum:
  name_template: 'checksums.txt'

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'

homebrew_casks:
  - name: ripjira
    binaries:
      - ripjira
    repository:
      owner: billygate
      name: homebrew-tap
      token: "{{ .Env.GORELEASER_GITHUB_TOKEN }}"
    directory: Casks
    homepage: "https://github.com/billygate/ripjira"
    description: "Jira CLI client with a TUI"
    hooks:
      post:
        install: |
          if OS.mac?
            system_command "/usr/bin/xattr",
              args: ["-dr", "com.apple.quarantine", "#{staged_path}/ripjira"]
          end
          system_command "/bin/ln",
            args: ["-sf", "#{HOMEBREW_PREFIX}/bin/ripjira",
                   "#{HOMEBREW_PREFIX}/bin/rj"]
        uninstall: |
          system_command "/bin/rm", args: ["-f", "#{HOMEBREW_PREFIX}/bin/rj"]
